name: Deploy All Services

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      admin: ${{ steps.filter.outputs.admin }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'helpdesk-laa-frontend/**'
            admin:
              - 'admin-page/**'
            backend:
              - 'backend_chatbot/**'

  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy helpdesk-laa-frontend ke Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-admin:
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy admin-page ke Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    # Runner self-hosted yang jalan langsung di VPS (user "chatbot") — bukan
    # runner GitHub di Azure. Dipakai karena Hostinger/network memblokir SSH
    # inbound dari IP range Azure (GitHub-hosted runner), jadi pendekatan SSH
    # appleboy/ssh-action tidak bisa diandalkan. Lihat deployment/setup-vps.sh
    # untuk catatan; runner didaftarkan manual via Settings > Actions > Runners.
    runs-on: [self-hosted, vps-backend]
    steps:
      - name: Jalankan deploy-backend.sh langsung di VPS
        run: bash /opt/helpdesk-backend/deployment/deploy-backend.sh


name: Deploy Backend ke Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'backend_chatbot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Copy file Python ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend_chatbot/api_chatbot.py,backend_chatbot/stopwords.py,backend_chatbot/requirements.txt,backend_chatbot/config.json,backend_chatbot/label_mapping.json,backend_chatbot/tokenizer_config.json"
          target: "/opt/helpdesk-backend/"
          strip_components: 1

      - name: Install dependencies & Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/helpdesk-backend
            if [ requirements.txt -nt venv/last_install ]; then
              echo "requirements.txt berubah, menjalankan pip install..."
              source venv/bin/activate
              pip install -r requirements.txt
              touch venv/last_install
            else
              echo "requirements.txt tidak berubah, skip pip install."
            fi
            chown -R chatbot:chatbot /opt/helpdesk-backend
            systemctl restart helpdesk-api
